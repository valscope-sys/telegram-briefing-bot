name: Update Calendar

on:
  # 캘린더 자동 업데이트 — GitHub Secrets 설정 후 활성화
  # schedule:
  #   - cron: '0 15 * * *'  # 매일 00:00 KST (15:00 UTC)
  workflow_dispatch:  # 수동 실행만 유지

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml feedparser python-dotenv anthropic

      - name: Update calendar data
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python -m cal_data.update --full

      - name: Copy to docs
        run: cp cal_data/calendar.json docs/calendar.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cal_data/calendar.json docs/calendar.json
          git diff --cached --quiet || git commit -m "auto: update calendar [$(date +%Y-%m-%d)]"
          git push
