name: Update Calendar

on:
  schedule:
    - cron: '0 21 * * *'  # 매일 06:00 KST (21:00 UTC) — FnGuide 05:38 KST 배치 업데이트 직후
  workflow_dispatch:  # 수동 실행

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml feedparser python-dotenv anthropic

      - name: Update calendar data
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m cal_data.update --full

      - name: Copy to docs
        run: cp cal_data/calendar.json docs/calendar.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cal_data/calendar.json docs/calendar.json
          git diff --cached --quiet || git commit -m "auto: update calendar [$(date +%Y-%m-%d)]"
          git push
