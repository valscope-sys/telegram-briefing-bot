name: Evening Briefing

on:
  schedule:
    - cron: '0 4 * * 1-5'  # 월~금 UTC 04:00 → 지연 감안 실제 KST 16:00~17:00 도착 목표
  workflow_dispatch:
permissions:
  contents: write

  
jobs:
  evening:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r telegram_bot/requirements.txt
      - name: Run Evening Briefing
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m telegram_bot.main evening
      - name: Save brain (market context + briefing memory)
        run: |
          git config user.name "noderesearch-bot"
          git config user.email "bot@noderesearch.com"
          git add telegram_bot/history/
          git diff --cached --quiet || git commit -m "auto: update market context [$(date +%Y-%m-%d)]"
          git push
